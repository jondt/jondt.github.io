<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <style>
        :root {
            --bg-color: #fafafa;
            --text-main: #111111;
            --text-muted: #666666;
            --accent: #000000;
            --accent-hover: #333333;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-stack);
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
            -webkit-font-smoothing: antialiased;
        }

        main {
            max-width: 480px;
            width: 100%;
            text-align: center;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 3rem;
            text-transform: uppercase;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 600;
            letter-spacing: -0.03em;
            line-height: 1.2;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1.05rem;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            font-weight: 400;
        }

        .cta-button {
            display: inline-block;
            background-color: var(--accent);
            color: #ffffff;
            text-decoration: none;
            padding: 0.8rem 2rem;
            font-size: 0.95rem;
            font-weight: 500;
            border-radius: 4px;
            transition: background-color 0.2s ease;
        }

        .cta-button:hover {
            background-color: var(--accent-hover);
        }

        footer {
            margin-top: 5rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

    <main>
<!--        <div class="logo">JTJ</div>    -->
        
        <h1>Some details.<br>More clarity.</h1>
        
        <p>A workspace.</p>
        
        <a href="#" class="cta-button">Get Started</a>
    </main>

    <footer>
        &copy; 2026 JTJ. All rights reserved.
    </footer>

</body>
</html>
