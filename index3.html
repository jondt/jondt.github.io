<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Link Grid</title>
  <style>
    :root {
      --bg: #fafafa;
      --text: #111;
      --muted: #777;
      --line: #e6e6e6;
      --hover: #f2f2f2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(92vw, 900px);
      padding: 48px 0;
    }

    header {
      margin-bottom: 28px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 500;
      letter-spacing: -0.04em;
    }

    p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .link-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      background: white;
    }

    .link-grid a {
      min-height: 92px;
      display: grid;
      place-items: center;
      padding: 18px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      color: inherit;
      text-decoration: none;
      font-size: 0.98rem;
      transition: background 150ms ease, transform 150ms ease;
    }

    .link-grid a:nth-child(5n) {
      border-right: 0;
    }

    .link-grid a:nth-last-child(-n + 5) {
      border-bottom: 0;
    }

    .link-grid a:hover,
    .link-grid a:focus-visible {
      background: var(--hover);
      outline: none;
    }

    .link-grid a:active {
      transform: scale(0.98);
    }

    @media (max-width: 720px) {
      .link-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .link-grid a,
      .link-grid a:nth-child(5n),
      .link-grid a:nth-last-child(-n + 5) {
        border-right: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
      }

      .link-grid a:nth-child(2n) {
        border-right: 0;
      }

      .link-grid a:nth-last-child(-n + 1) {
        border-bottom: 0;
      }
    }

    @media (max-width: 420px) {
      .link-grid {
        grid-template-columns: 1fr;
      }

      .link-grid a,
      .link-grid a:nth-child(2n) {
        border-right: 0;
      }

      .link-grid a:last-child {
        border-bottom: 0;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>links</h1>
      <p>'n' stuff</p>
    </header>

    <nav class="link-grid" aria-label="Link grid">
