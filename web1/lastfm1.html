<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>xjonc · Top Tracks · Last 500 Days</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #0d0d10;
      --surface:  #16161c;
      --border:   #2a2a35;
      --accent:   #d93f3f;
      --accent2:  #e8834e;
      --text:     #e8e6e1;
      --muted:    #7a7a8a;
      --bar-bg:   #222230;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      padding: 2rem 1.5rem 4rem;
    }

    /* ── Header ── */
    header {
      max-width: 960px;
      margin: 0 auto 2.5rem;
      display: flex;
      align-items: flex-end;
      gap: 1.5rem;
    }

    .lfm-logo {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-family: 'Space Mono', monospace;
      font-size: clamp(1.3rem, 3vw, 1.8rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .header-text h1 span {
      color: var(--accent);
    }

    .header-text p {
      margin-top: 0.3rem;
      font-size: 0.82rem;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
    }

    /* ── Status / error ── */
    #status {
      max-width: 960px;
      margin: 0 auto 1.5rem;
      font-size: 0.85rem;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      min-height: 1.2em;
    }

    #status.error { color: var(--accent); }

    /* ── Grid ── */
    #grid {
      max-width: 960px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    @media (max-width: 580px) {
      #grid { grid-template-columns: 1fr; }
    }

    /* ── Track card ── */
    .track {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.85rem 1rem 0.85rem 0.85rem;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0 0.85rem;
      align-items: center;
      position: relative;
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .track:hover { border-color: #444455; }

    /* rank badge */
    .rank {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--muted);
      width: 1.6rem;
      text-align: right;
      align-self: start;
      padding-top: 0.1rem;
    }

    .rank.top3 { color: var(--accent2); }

    /* art */
    .art {
      grid-column: 1;
      grid-row: 1 / 3;
      display: none; /* shown when image loads */
    }

    /* info */
    .info {
      grid-column: 2;
      min-width: 0;
    }

    .track-name {
      font-weight: 700;
      font-size: 0.92rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.25;
    }

    .artist-name {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.2rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* play bar */
    .bar-wrap {
      grid-column: 2;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .bar {
      flex: 1;
      height: 4px;
      background: var(--bar-bg);
      border-radius: 2px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      transition: width 0.6s cubic-bezier(.4,0,.2,1);
      width: 0%;
    }

    .plays {
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      color: var(--accent2);
      white-space: nowrap;
    }

    /* ── Skeleton loader ── */
    .skeleton {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.85rem 1rem;
      height: 72px;
      position: relative;
      overflow: hidden;
    }

    .skeleton::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, #ffffff0d 50%, transparent 100%);
      animation: shimmer 1.4s infinite;
    }

    @keyframes shimmer {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    /* ── Footer ── */
    footer {
      max-width: 960px;
      margin: 2rem auto 0;
      font-size: 0.72rem;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <!-- Last.fm "audioscrobbler" red waves SVG logo mark -->
  <svg class="lfm-logo" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="22" cy="22" r="22" fill="#d93f3f"/>
    <path d="M10 27c2-5 5-8 8-8s5 3 6 6c1 3 3 5 5 5s4-2 5-5" stroke="#fff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M7 22c3-7 7-11 12-11s8 4 9 8c1 4 3 7 7 7s6-3 8-8" stroke="#fff" stroke-width="2" stroke-linecap="round" fill="none" opacity=".5"/>
  </svg>
  <div class="header-text">
    <h1><span>xjonc</span> · Top 20 Tracks</h1>
    <p id="date-range">Last 500 days · loading…</p>
  </div>
</header>

<div id="status">Fetching scrobbles…</div>
<div id="grid"></div>

<footer>
  <span>Data via <a href="https://www.last.fm/user/xjonc" target="_blank">Last.fm</a></span>
  <span id="footer-ts"></span>
</footer>

<script>
  const API_KEY = 'c9b43f29deea4a1b8c9a64c48af65e47'; // public demo key - replace with your own
  const USER    = 'xjonc';
  const DAYS    = 500;

  const now   = Math.floor(Date.now() / 1000);
  const from  = now - DAYS * 86400;

  // Format date nicely
  const fmt = ts => new Date(ts * 1000).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  document.getElementById('date-range').textContent =
    `${fmt(from)} → ${fmt(now)} · 500 days`;
  document.getElementById('footer-ts').textContent =
    `Generated ${new Date().toLocaleString()}`;

  const grid   = document.getElementById('grid');
  const status = document.getElementById('status');

  // Show skeletons while loading
  for (let i = 0; i < 20; i++) {
    const s = document.createElement('div');
    s.className = 'skeleton';
    grid.appendChild(s);
  }

  async function fetchPage(page) {
    const url = `https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks` +
      `&user=${USER}&api_key=${API_KEY}&format=json` +
      `&from=${from}&to=${now}&limit=200&page=${page}`;
    const r = await fetch(url);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  }

  async function run() {
    try {
      // First page to get total
      const first  = await fetchPage(1);
      const attr   = first.recenttracks['@attr'];
      const total  = parseInt(attr.totalPages, 10);
      const totalT = parseInt(attr.total, 10);

      status.textContent = `Counting ${totalT.toLocaleString()} scrobbles across ${total} page${total!==1?'s':''}…`;

      // Tally
      const counts = {}; // "Artist\x00Track" -> { artist, track, plays, image }

      function tally(data) {
        const tracks = data.recenttracks.track;
        if (!tracks) return;
        const list = Array.isArray(tracks) ? tracks : [tracks];
        for (const t of list) {
          if (t['@attr']?.nowplaying) continue; // skip currently-playing stub
          const key = `${t.artist['#text']}\x00${t.name}`;
          if (!counts[key]) {
            counts[key] = {
              artist: t.artist['#text'],
              track:  t.name,
              plays:  0,
              image:  t.image?.find(i => i.size === 'medium')?.['#text'] || ''
            };
          }
          counts[key].plays++;
        }
      }

      tally(first);

      // Fetch remaining pages in batches of 5
      const pages = [];
      for (let p = 2; p <= total; p++) pages.push(p);

      const BATCH = 5;
      for (let i = 0; i < pages.length; i += BATCH) {
        const batch = pages.slice(i, i + BATCH);
        const results = await Promise.all(batch.map(p => fetchPage(p)));
        results.forEach(tally);
        const done = i + batch.length;
        status.textContent = `Loading… ${Math.min(done + 1, total)} / ${total} pages`;
      }

      // Sort and take top 20
      const top20 = Object.values(counts)
        .sort((a, b) => b.plays - a.plays)
        .slice(0, 20);

      if (top20.length === 0) {
        status.textContent = 'No scrobbles found in this window.';
        grid.innerHTML = '';
        return;
      }

      status.textContent = `${totalT.toLocaleString()} total scrobbles · ${Object.keys(counts).length.toLocaleString()} unique tracks`;
      const max = top20[0].plays;

      // Render
      grid.innerHTML = '';
      top20.forEach((t, i) => {
        const card = document.createElement('div');
        card.className = 'track';

        const pct = Math.round((t.plays / max) * 100);

        card.innerHTML = `
          <div class="rank ${i < 3 ? 'top3' : ''}">#${i + 1}</div>
          <div class="info">
            <div class="track-name" title="${esc(t.track)}">${esc(t.track)}</div>
            <div class="artist-name">${esc(t.artist)}</div>
          </div>
          <div class="bar-wrap">
            <div class="bar"><div class="bar-fill" style="width:0%" data-pct="${pct}"></div></div>
            <span class="plays">${t.plays.toLocaleString()} plays</span>
          </div>
        `;
        grid.appendChild(card);
      });

      // Animate bars after paint
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          document.querySelectorAll('.bar-fill').forEach(el => {
            el.style.width = el.dataset.pct + '%';
          });
        });
      });

    } catch (e) {
      console.error(e);
      grid.innerHTML = '';
      status.className = 'error';
      status.textContent = `Error: ${e.message}. Check the API key or try again.`;
    }
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  run();
</script>
</body>
</html>
